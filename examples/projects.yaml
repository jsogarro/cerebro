# Example batch file for creating multiple research projects

- title: "Impact of Artificial Intelligence on Employment"
  query_text: "How will artificial intelligence affect employment patterns and job markets in the next decade?"
  domains:
    - AI
    - Economics
    - Labor Markets
  depth_level: comprehensive
  user_id: researcher-001
  scope:
    max_sources: 100
    languages:
      - en
      - es
    geographic_scope:
      - North America
      - Europe

- title: "Climate Change and Food Security"
  query_text: "What are the impacts of climate change on global food security and agricultural systems?"
  domains:
    - Climate Science
    - Agriculture
    - Food Security
    - Environmental Science
  depth_level: exhaustive
  user_id: researcher-001
  scope:
    max_sources: 150
    languages:
      - en
    time_period_start: 2020-01-01
    time_period_end: 2024-12-31

- title: "Quantum Computing Applications in Drug Discovery"
  query_text: "How can quantum computing accelerate drug discovery and pharmaceutical research?"
  domains:
    - Quantum Computing
    - Pharmaceutical Science
    - Drug Discovery
    - Computational Chemistry
  depth_level: survey
  user_id: researcher-002