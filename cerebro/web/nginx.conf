server {
    # Listen on a non-privileged port so the nginx worker (and master) can
    # run as a non-root user. External consumers continue to reach the
    # frontend on port 80/443 via the docker-compose port mapping
    # (`<host>:8080`) and the upstream reverse proxy in
    # `docker/nginx/nginx.conf`.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression for performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Routing fallback for React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Avoid caching index.html to ensure fresh deployments are loaded
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
