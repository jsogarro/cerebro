# ExternalSecret resources that materialise the
# `research-platform-secrets` Kubernetes Secret from a cloud secret store.
#
# Replaces the previously committed `k8s/secrets.yaml`, which stored secret
# values in Base64 (encoding, not encryption) inside the repository.
#
# Prerequisites for this manifest to apply successfully:
#   1. External Secrets Operator is installed in the cluster
#      (https://external-secrets.io/) — provides the
#      `external-secrets.io/v1beta1` API.
#   2. A `ClusterSecretStore` (or namespaced `SecretStore`) named
#      `research-platform-secret-store` is configured to authenticate against
#      the cloud secret manager (AWS Secrets Manager, GCP Secret Manager,
#      Azure Key Vault, or HashiCorp Vault).
#   3. The referenced cloud secrets contain the keys listed under `data:`.
#
# After ExternalSecret reconciles successfully, a Kubernetes `Secret` named
# `research-platform-secrets` is generated with the same key set as the
# previous committed Secret, so existing Deployments referencing that name
# continue to work unchanged.
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: research-platform-secrets
  namespace: research-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: research-platform-secret-store
    kind: ClusterSecretStore
  target:
    name: research-platform-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: research-platform/gemini-api-key
    - secretKey: SECRET_KEY
      remoteRef:
        key: research-platform/secret-key
    - secretKey: JWT_SECRET_KEY
      remoteRef:
        key: research-platform/jwt-secret-key
    - secretKey: DATABASE_URL
      remoteRef:
        key: research-platform/database-url
    - secretKey: REDIS_URL
      remoteRef:
        key: research-platform/redis-url
    - secretKey: TEMPORAL_HOST
      remoteRef:
        key: research-platform/temporal-host
