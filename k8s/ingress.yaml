apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: research-platform-ingress
  namespace: research-platform
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "research-platform-ip"
    networking.gke.io/managed-certificates: "research-platform-cert"
    ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  rules:
  - host: api.research-platform.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: research-api-service
            port:
              number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: research-platform-cert
  namespace: research-platform
spec:
  domains:
  - api.research-platform.example.com