apiVersion: v1
kind: ServiceAccount
metadata:
  name: research-platform-sa
  namespace: research-platform
  annotations:
    iam.gke.io/gcp-service-account: research-platform@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: research-platform-role
  namespace: research-platform
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: research-platform-rolebinding
  namespace: research-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: research-platform-role
subjects:
- kind: ServiceAccount
  name: research-platform-sa
  namespace: research-platform