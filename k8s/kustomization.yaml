apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: research-platform

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - configmap.yaml
  # The committed `secrets.yaml` is replaced by `external-secrets.yaml`,
  # which projects values from a cloud secret manager via the External
  # Secrets Operator. Deployments still reference the same Secret name
  # (`research-platform-secrets`).
  - external-secrets.yaml
  - deployment-api.yaml
  - deployment-worker.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - networkpolicy.yaml

images:
  - name: gcr.io/PROJECT_ID/research-platform-api
    newTag: latest
  - name: gcr.io/PROJECT_ID/research-platform-worker
    newTag: latest

configMapGenerator:
  - name: research-platform-config
    behavior: merge
    literals:
      - ENVIRONMENT=production

# secretGenerator removed: the Kubernetes Secret named
# `research-platform-secrets` is now produced by the ExternalSecret in
# `external-secrets.yaml`, which sources values from the cluster's
# configured secret store rather than a committed `secrets.env` file.

replicas:
  - name: research-api
    count: 3
  - name: research-worker
    count: 5

commonLabels:
  app.kubernetes.io/name: research-platform
  app.kubernetes.io/managed-by: kustomize