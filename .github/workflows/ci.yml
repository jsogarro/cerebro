name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  UV_VERSION: "0.4.18"
  NODE_VERSION: "20"

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Run ruff
        run: |
          ruff check src tests
      
      - name: Check black formatting
        run: |
          black --check src tests
      
      - name: Run mypy
        run: |
          mypy src

  test:
    name: Test Suite (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: research_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/research_test
          REDIS_URL: redis://localhost:6379
          TEMPORAL_HOST: localhost:7233
        run: |
          pytest --cov=src --cov-report=xml --cov-report=html --cov-report=term
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
      
      - name: Upload coverage HTML
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: htmlcov/
      
      - name: Check coverage threshold
        run: |
          coverage report --fail-under=80

  test-temporal:
    name: Temporal Workflow Tests
    runs-on: ubuntu-latest
    
    services:
      temporal:
        image: temporalio/auto-setup:latest
        ports:
          - 7233:7233
        env:
          TEMPORAL_ADDRESS: localhost:7233
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Wait for Temporal
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:7233/health; then
              echo "Temporal is ready"
              break
            fi
            echo "Waiting for Temporal..."
            sleep 2
          done
      
      - name: Run Temporal tests
        env:
          TEMPORAL_HOST: localhost:7233
        run: |
          pytest tests/test_temporal_workflows.py -v

  test-cli:
    name: CLI Integration Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Test CLI installation
        run: |
          research-cli --version
          research-cli --help
      
      - name: Run CLI tests
        run: |
          pytest tests/test_cli.py -v

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: ${{ env.UV_VERSION }}
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install bandit[toml] safety pip-audit
      
      - name: Run bandit
        run: |
          bandit -r src -f json -o bandit-report.json || true
          bandit -r src
      
      - name: Run safety check
        run: |
          uv pip freeze | safety check --stdin --json
      
      - name: Run pip-audit
        run: |
          pip-audit
      
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            bandit-report.json

  validate-docker:
    name: Validate Docker Build
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Validate Dockerfile
        run: |
          docker run --rm -i hadolint/hadolint < Dockerfile || true
          docker run --rm -i hadolint/hadolint < docker/Dockerfile.worker || true
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: research-platform-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: production
      
      - name: Build Worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile.worker
          push: false
          tags: research-platform-worker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v5
        with:
          context: ./cerebro/web
          file: ./cerebro/web/Dockerfile
          push: false
          tags: research-platform-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  validate-k8s:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'
      
      - name: Install kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/
      
      - name: Validate manifests
        run: |
          for file in k8s/*.yaml; do
            echo "Validating $file"
            kubectl apply --dry-run=client -f "$file"
          done
      
      - name: Build with kustomize
        run: |
          kustomize build k8s/ > /tmp/rendered.yaml
          kubectl apply --dry-run=client -f /tmp/rendered.yaml

  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cerebro/web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './cerebro/web/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run E2E Tests
        run: npm run test:e2e

      - name: Build
        run: npm run build

  all-checks:
    name: All CI Checks
    needs: [lint, test, test-temporal, test-cli, security, validate-docker, validate-k8s, frontend-ci]
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Check all job statuses
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI checks failed"
            exit 1
          else
            echo "All CI checks passed"
          fi