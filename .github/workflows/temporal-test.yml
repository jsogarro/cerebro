name: Temporal Workflow Tests

on:
  push:
    paths:
      - 'src/temporal/**'
      - 'tests/test_temporal_workflows.py'
  pull_request:
    paths:
      - 'src/temporal/**'
      - 'tests/test_temporal_workflows.py'
  workflow_dispatch:

jobs:
  test-workflows:
    name: Test Temporal Workflows
    runs-on: ubuntu-latest
    
    services:
      temporal:
        image: temporalio/auto-setup:latest
        ports:
          - 7233:7233
        env:
          - TEMPORAL_ADDRESS=localhost:7233
          - SKIP_DEFAULT_NAMESPACE_CREATION=false
          - SKIP_ADD_CUSTOM_SEARCH_ATTRIBUTES=false
      
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: temporal
          POSTGRES_PASSWORD: temporal
          POSTGRES_DB: temporal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: '0.4.18'
          enable-cache: true
      
      - name: Install dependencies
        run: |
          uv pip install -e ".[dev]"
      
      - name: Wait for Temporal Server
        run: |
          echo "Waiting for Temporal server to be ready..."
          for i in {1..60}; do
            if curl -f http://localhost:7233/health; then
              echo "Temporal server is ready!"
              break
            fi
            echo "Attempt $i: Temporal not ready yet..."
            sleep 2
          done
          
          # Verify Temporal is fully operational
          curl -f http://localhost:7233/health || exit 1
      
      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> $GITHUB_PATH
      
      - name: Create test namespace
        run: |
          temporal operator namespace create test-namespace || true
      
      - name: Run Temporal unit tests
        env:
          TEMPORAL_HOST: localhost:7233
          TEMPORAL_NAMESPACE: default
        run: |
          pytest tests/test_temporal_workflows.py::TestResearchActivities -v --tb=short
      
      - name: Start test worker
        run: |
          python -m src.temporal.worker &
          WORKER_PID=$!
          echo "WORKER_PID=$WORKER_PID" >> $GITHUB_ENV
          
          # Wait for worker to start
          sleep 5
          
          # Verify worker is running
          ps -p $WORKER_PID || exit 1
      
      - name: Run Temporal integration tests
        env:
          TEMPORAL_HOST: localhost:7233
          TEMPORAL_NAMESPACE: default
          DATABASE_URL: postgresql://temporal:temporal@localhost:5432/temporal
        run: |
          pytest tests/test_temporal_workflows.py::TestResearchWorkflow -v --tb=short
      
      - name: Run Temporal orchestration tests
        env:
          TEMPORAL_HOST: localhost:7233
          TEMPORAL_NAMESPACE: default
        run: |
          pytest tests/test_temporal_workflows.py::TestWorkflowOrchestration -v --tb=short
      
      - name: Test workflow cancellation
        run: |
          # Start a long-running workflow
          python -c "
          import asyncio
          from src.temporal.client import TemporalResearchClient
          from src.models.research_project import ResearchProject, ResearchQuery
          
          async def test():
              client = TemporalResearchClient()
              await client.connect()
              
              project = ResearchProject(
                  title='Test Project',
                  query=ResearchQuery(
                      text='Test query',
                      domains=['Test'],
                      depth_level='comprehensive'
                  ),
                  user_id='test-user'
              )
              
              workflow_id = await client.start_research_workflow(project)
              print(f'Started workflow: {workflow_id}')
              
              # Wait a bit
              await asyncio.sleep(2)
              
              # Cancel it
              success = await client.cancel_workflow(workflow_id)
              print(f'Cancelled: {success}')
              
              await client.disconnect()
          
          asyncio.run(test())
          " || echo "Cancellation test completed"
      
      - name: Stop test worker
        if: always()
        run: |
          if [[ -n "$WORKER_PID" ]]; then
            kill $WORKER_PID || true
          fi
      
      - name: Collect Temporal server logs
        if: failure()
        run: |
          docker logs $(docker ps -q --filter "ancestor=temporalio/auto-setup:latest") > temporal-server.log 2>&1
      
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: temporal-logs
          path: |
            temporal-server.log
            pytest.log